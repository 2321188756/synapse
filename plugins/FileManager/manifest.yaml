name: FileManager
display_name: 文件管理
version: 1.0.0
description: 安全文件读写/列表/删除，限定 data/files/ 目录
type: tool
runtime: subprocess
entry: main.py
enabled: true

tool:
  instruction: |
    ⚠️ 文件操作必须使用本工具！不要凭空说"已创建"但没调用。
    write = 新建/覆盖文件（支持嵌套路径，自动创建目录）
    read  = 读取已有文件
    list  = 列出目录
    delete = 删除文件
    路径限制在 data/files/ 内，不能访问上层目录。
    不要创建 .gitkeep 等隐藏占位文件。

  parameters:
    command:
      type: string
      description: 操作类型
      enum: [read, write, list, delete]
      required: true
    path:
      type: string
      description: 文件路径（相对于 data/files/）
      required: true
    content:
      type: string
      description: 写入内容（write 时必填）

  examples:
    - description: 读取文件
      call: |
        <<<TOOL>>>
        name: FileManager
        params:
          command: read
          path: notes/ideas.txt
        <<<END>>>
    - description: 写入文件
      call: |
        <<<TOOL>>>
        name: FileManager
        params:
          command: write
          path: notes/summary.md
          content: |
            # 会议纪要
            今天讨论了架构设计
        <<<END>>>

  timeout: 10

config:
  root_path:
    type: string
    description: 文件操作根目录
    default: data/files
