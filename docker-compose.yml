version: "3.8"

services:
  synapse:
    build: .
    container_name: synapse
    ports:
      - "5890:5890"
    volumes:
      - synapse-data:/app/data
      - synapse-logs:/app/logs
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - NODE_ENV=production
      - DEFAULT_TIMEZONE=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5890/api/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  synapse-data:
  synapse-logs: